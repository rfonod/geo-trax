# This is the default main geo-trax configuration file (default.yaml).
#
# It links sub-configuration files for each pipeline stage and sets shared parameters that
# control video processing, visualization, and plotting. Parameters marked with "(CLI override)"
# can be temporarily overridden via the matching command-line argument; the value here is the
# persistent default. All defaults below preserve the original CLI behavior so existing
# invocations remain unaffected.
#
# Tuned for DJI Mavic 3 footage at 140–150 m altitude, 4K resolution.
# Adjust for different hardware as needed.
#
# Sub-configuration docs:
#   - Stabilo  (stabilization): https://github.com/rfonod/stabilo
#   - Ultralytics (detection):  https://github.com/ultralytics/ultralytics


# --- Sub-configuration file paths ---
cfg_ultralytics: cfg/ultralytics/default.yaml  # Ultralytics YOLO config (model, conf, iou, classes, etc.)
cfg_tracker:     cfg/tracker/default_botsort.yaml  # Tracker config; choices: default_botsort.yaml, default_bytetrack.yaml
cfg_stabilo:     cfg/stabilo/default.yaml      # Stabilo stabilizer config
cfg_georef:      cfg/georef/default.yaml       # Georeferencing config

# --- Stabilization ---
stabilize: true   # Stabilize extracted bounding boxes; appends 4 columns (x_stab, y_stab, w_stab, h_stab) to results/video.txt
save_stab: true   # Save per-frame stabilization homographies to results/video_vid_transf.txt

# --- Vehicle dimension estimation ---
dimension_estimation:
  gsd: 0.02725    # Ground sample distance [m/px]; tuned for DJI Mavic 3 at 140–150 m altitude, 4K resolution
  eps: 4          # Visibility margin [px]; bounding boxes closer than this to any frame edge are excluded; [0, inf)
  r0: 1.25        # Minimum vehicle displacement [m] required before computing travel azimuth; (0, inf)
  theta_bar: 15   # Maximum azimuth deviation [deg] from cardinal directions to classify a pass as parallel; [0, 90]
  tau_c:          # Per-class minimum length/width ratio used to reject stationary vehicles as non-elongated
    0: 1.83       # Car (includes vans, SUVs)
    1: 2.85       # Bus
    2: 1.70       # Truck
    3: 1.80       # Motorcycle
    -1: 1.70      # Unknown / unassigned class

# --- Video processing settings (CLI override) ---
# These control how many frames to process. Override with --cut-frame-left / --cut-frame-right.
processing:
  cut_frame_left: 0     # Skip this many frames at the start; [0, inf) — CLI: --cut-frame-left
  cut_frame_right: null # Stop at this frame number (null = process the entire video) — CLI: --cut-frame-right

# --- Visualization settings (CLI override) ---
# These control the annotated-video output from visualize.py. Override any key via its CLI flag.
visualization:
  tail_length: 30         # Track tail length [frames]; number of past positions drawn as a fading trail; [1, inf)
  line_width: 2           # Bounding-box and track stroke width [px]; [1, inf)
  save: false             # Save annotated output video to file — CLI: --save / --no-save
  show: false             # Open a live preview window during processing — CLI: --show / --no-show
  viz_mode: 0             # Frame source for annotation: 0=original, 1=stabilized, 2=reference frame — CLI: --viz-mode
  plot_trajectories: false  # Overlay all trajectory positions on the first frame before the main pass — CLI: --plot-trajectories / --no-plot-trajectories
  plot_delay: 30          # Frames to hold the trajectory overlay before starting the main pass; [1, inf) — CLI: --plot-delay
  show_conf: false        # Include detection confidence score in the bounding-box label — CLI: --show-conf / --no-show-conf
  show_lanes: false       # Include lane ID in the bounding-box label (requires georeferencing) — CLI: --show-lanes / --no-show-lanes
  show_class_names: false  # Include vehicle class name in the bounding-box label — CLI: --show-class-names / --no-show-class-names
  hide_labels: false      # Suppress all label text overlays — CLI: --hide-labels / --no-hide-labels
  hide_tracks: false      # Suppress track tail lines — CLI: --hide-tracks / --no-hide-tracks
  hide_speed: false       # Suppress speed values in labels (requires georeferencing) — CLI: --hide-speed / --no-hide-speed
  speed_unit: "km/h"     # Speed display unit; choices: [km/h, mi/h] — CLI: --speed-unit
  class_filter: []        # Vehicle class IDs to exclude from visualization (e.g. [1, 2] hides bus and truck) — CLI: --class-filter

# --- Plotting settings (CLI override) ---
# These control the output from plot.py. Override any key via its CLI flag.
plotting:
  stationary_speed_cutoff: 1  # Minimum speed [km/h] for a vehicle to appear in speed/acceleration plots; [0, inf)
  savefig_font_size: 14       # Font size used in saved figures; [1, inf)
  colors: ['#76b041', '#3274d9', '#ff61b4', '#ff9d00', '#9954bb', '#ffc000']  # Per-source trajectory colors used when aggregation is enabled
  skip_filenames_with: ['bus', 'ids', 'transf']  # Skip result files whose stem contains any of these substrings
  save: false               # Save plots as PDF files — CLI: --save / --no-save
  show: true                # Show plots in an interactive window — CLI: --show / --no-show
  aggregate: false          # Aggregate trajectories per intersection/location ID — CLI: --aggregate / --no-aggregate
  plot_points: false        # Plot discrete trajectory points instead of connected lines — CLI: --points / --no-points
  use_segmentations: false  # Colour-code trajectory backgrounds using road-segment orthophotos — CLI: --segmentations / --no-segmentations
  class_filter: []          # Vehicle class IDs to exclude from plots (e.g. [1] hides bus) — CLI: --class-filter
