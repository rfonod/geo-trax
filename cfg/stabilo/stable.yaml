# This is the high-accuracy Stabilo configuration (stable.yaml).
#
# Compared to default.yaml, this configuration uses full-resolution input (no downsampling),
# resulting in higher-fidelity features and improved stabilization accuracy at the cost of slower processing.
# Use this preset when stabilization quality is the priority.
#
# Full parameter reference: https://github.com/rfonod/stabilo
# Optimization methodology: https://github.com/rfonod/stabilo-optimize


# --- Image pre-processing ---
clahe: false          # Apply Contrast Limited Adaptive Histogram Equalization before feature detection; [true, false]
downsample_ratio: 1.0 # No downsampling; process at full resolution for higher accuracy; (0.0, 1.0]

# --- Feature detector and descriptor ---
detector_name: 'orb'  # Feature detector/descriptor; choices: [orb, sift, rsift, brisk, kaze, akaze]
max_features: 2000    # Maximum keypoints to detect per frame; higher = more robust but slower; [0, inf)
ref_multiplier: 2.0   # Multiplier applied to max_features for the reference frame only; (0.0, inf)

# --- Feature matching and filtering ---
matcher_name: 'bf'    # Matching strategy; choices: [bf (brute-force), flann]
filter_type: 'ratio'  # Post-match filter; choices: [none, ratio (Lowe), distance]
filter_ratio: 0.9     # Lowe ratio-test threshold; lower = stricter (fewer but better matches); (0.0, 1.0]

# --- Transformation estimation ---
transformation_type: 'projective'  # Geometric model to estimate; choices: [projective, affine]
ransac_method: 38                  # RANSAC method; [4: LMEDS, 8: RANSAC, 16: RHO, 32: DEGENSAC, 33: DEGENSAC (with different parameters), 35: LO-RANSAC, 36: GC-RANSAC, 37: PROSAC, 38: MAGSAC++]
ransac_epipolar_threshold: 2.0     # Reprojection error threshold [px] for RANSAC inlier classification; (0.0, inf)
ransac_max_iter: 5000              # Maximum RANSAC iterations; (0, inf]
ransac_confidence: 0.999999        # Required probability that the best model is correct; (0.0, 1.0]

# --- Foreground mask ---
mask_use: true            # Exclude detected vehicle bounding boxes from feature extraction; [true, false]
mask_margin_ratio: 0.15   # Extra margin around each bounding box mask as a fraction of its size; [0.0, 1.0]

# --- Detector-specific thresholds (used if threshold analysis was not performed) ---
brisk_threshold: 130  # BRISK response threshold; lower = more keypoints; (0, 255]
kaze_threshold: 0.01  # KAZE response threshold; lower = more keypoints; (0.0, inf]
akaze_threshold: 0.01 # AKAZE response threshold; lower = more keypoints; (0.0, inf]

# --- Computation ---
gpu: false       # Use GPU-accelerated operations where available; [true, false]

# --- Diagnostics ---
viz: false       # Retain keypoints and match visualizations in memory (for debugging); [true, false]
benchmark: false # Enable timing benchmarks per frame; [true, false]

# --- Warning thresholds ---
min_good_match_count_warning: 20    # Warn if filtered match count falls below this; [0, inf]
min_inliers_match_count_warning: 10 # Warn if RANSAC inlier count falls below this; [0, inf]
