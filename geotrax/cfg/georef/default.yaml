# This is the default configuration file (default.yaml) for the georeferencing module.

# --- Coordinate reference systems and orthophoto geometry ---
transformation:
  source_crs: epsg:4326    # CRS of the georeferenced orthophoto (e.g. epsg:4326 = WGS 84); string
  target_crs: epsg:5186    # Target projected CRS for local-coordinate output (e.g. epsg:5186 = Korea 2000); string
  cutout_width_px: 15000   # Original orthophoto cutout width [px]; used to derive geographic resolution when geo_source is 'center-text-file'; null falls back to the provided orthophoto width; [0, inf) or null

# --- Feature matching ---
matching:
  max_features: 250000           # Maximum number of features to detect; [0, inf)
  filter_ratio: 0.55             # Lowe ratio-test threshold; lower = stricter (fewer but better matches); (0.0, 1.0]
  ransac_method: 38              # RANSAC method; [4: LMEDS, 8: RANSAC, 16: RHO, 32: DEGENSAC, 33: DEGENSAC (with different parameters), 35: LO-RANSAC, 36: GC-RANSAC, 37: PROSAC, 38: MAGSAC++]
  ransac_epipolar_threshold: 3.0 # Reprojection error threshold [px] for RANSAC inlier classification; (0.0, inf)
  ransac_max_iter: 10000         # Maximum RANSAC iterations; (0, inf]
  ransac_confidence: 0.999999    # Required probability that the best model is correct; (0.0, 1.0]
  rsift_eps: 0.00000001          # Epsilon added before RootSIFT L1-normalisation to avoid division by zero; > 0.0, keep very small (e.g. 1e-8)

# --- Trajectory kinematics filtering and output quality thresholds ---
filtering:
  filter_type: gaussian   # Smoothing filter applied to speed before differentiation; choices: [gaussian, savgol]
  kernel_size: 14         # Smoothing kernel / window size [frames]; larger = smoother speed/acceleration; [1, inf)
  min_traj_length: 15     # Minimum number of georeferenced points required to keep a trajectory; shorter ones are discarded; [0, inf)
  visibility_margin: 4    # Distance [px] from any frame edge below which a vehicle is flagged as partially visible; [0, inf)

# --- Processing settings (CLI override) ---
# These control which video frame to use as registration anchor and how master homographies are handled.
processing:
  ref_frame: 0          # Video frame index used as the registration anchor; must match the stabilization reference frame; [0, inf) — CLI: --ref-frame
  use_master: true      # Use a pre-computed master→orthophoto homography for faster, more robust matching — CLI: --no-master (disables)
  recompute: false      # Force recomputation of the master→orthophoto homography even if a cached version exists — CLI: --recompute
  geo_source: null      # Orthophoto parameter source; null = auto-detect from available files; choices: [null, metadata-tif, text-file, center-text-file] — CLI: --geo-source

