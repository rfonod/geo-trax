# FastTracker tracker defaults for mode="track"
# Occlusion-aware, ByteTrack-style tracker with lightweight Kalman rollback and init-IoU suppression; ReID-free.
# Paper: https://arxiv.org/abs/2508.14370
# Docs:  https://docs.ultralytics.com/modes/track/

tracker_type: fasttrack  # Tracker backend; choices: [botsort, bytetrack, ocsort, deepocsort, fasttrack, tracktrack]
track_high_thresh: 0.25  # Detection confidence threshold for first-stage (high-confidence) association; [0.0, 1.0]
track_low_thresh: 0.1    # Detection confidence threshold for second-stage (low-confidence) recovery; [0.0, 1.0]
new_track_thresh: 0.25   # Minimum confidence to initialise a new track; higher reduces false track initiations; [0.0, 1.0]
track_buffer: 30         # Frames to keep a lost track alive before deletion; higher tolerates longer occlusions; [1, inf)
match_thresh: 0.8        # IoU/cost threshold for track-detection assignment; higher = stricter matching; [0.0, 1.0]
fuse_score: true         # Fuse detection confidence with the IoU cost matrix; improves weak-detection robustness; [true, false]

# FastTracker specific (occlusion handling)
reset_velocity_offset_occ: 5    # History frames to roll back for restoring Kalman velocity at occlusion onset; [0, inf)
reset_pos_offset_occ: 3         # History frames to roll back for restoring Kalman position at occlusion onset; [0, inf)
enlarge_bbox_occ: 1.1           # One-shot bbox-height scale while occluded (widens the search region); [1.0, inf)
dampen_motion_occ: 0.5          # Velocity dampening factor applied while occluded; [0.0, 1.0]
active_occ_to_lost_thresh: 10   # Max consecutive occluded frames before a track is marked lost; [1, inf)
occ_cover_thresh: 0.7           # Fraction of a track's area covered by another to declare occlusion; [0.0, 1.0]
occ_reappear_window: 40         # Frames a recently-occluded lost track stays re-findable; [1, inf)
init_iou_suppress: 0.7          # Suppress new-track init if IoU with any active track >= this (1.0 disables); [0.0, 1.0]
