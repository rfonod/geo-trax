# OC-SORT tracker defaults for mode="track"
# Observation-centric SORT: motion-only, ReID-free; robust to occlusion and non-linear motion.
# Paper: https://arxiv.org/abs/2203.14360
# Docs:  https://docs.ultralytics.com/modes/track/

tracker_type: ocsort     # Tracker backend; choices: [botsort, bytetrack, ocsort, deepocsort, fasttrack, tracktrack]
track_high_thresh: 0.25  # Detection confidence threshold for first-stage (high-confidence) association; [0.0, 1.0]
track_low_thresh: 0.1    # Detection confidence threshold for second-stage recovery; only used when use_byte=true; [0.0, 1.0]
new_track_thresh: 0.25   # Minimum confidence to initialise a new track; higher reduces false track initiations; [0.0, 1.0]
track_buffer: 30         # Frames to keep a lost track alive before deletion; higher tolerates longer occlusions; [1, inf)
match_thresh: 0.8        # IoU/cost threshold for track-detection assignment; higher = stricter matching; [0.0, 1.0]
fuse_score: true         # Fuse detection confidence with the IoU cost matrix; improves weak-detection robustness; [true, false]

# OC-SORT specific
delta_t: 3       # Temporal window [frames] for velocity-direction estimation in the OCM module; higher smooths more; [1, inf)
inertia: 0.2     # Weight of the velocity-consistency cost in association; higher penalises direction changes; [0.0, 1.0]
use_byte: false  # Enable a ByteTrack-style low-confidence second association pass; [true, false]
