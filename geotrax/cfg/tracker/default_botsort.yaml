# BoT-SORT tracker defaults for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: botsort    # Tracker backend; choices: [botsort, bytetrack, ocsort, deepocsort, fasttrack, tracktrack] — botsort enables GMC and optional ReID. To switch algorithm, point cfg_tracker in the main config to the matching default_<name>.yaml
track_high_thresh: 0.25  # Detection confidence threshold for first-stage (high-confidence) association; [0.0, 1.0]
track_low_thresh: 0.1    # Detection confidence threshold for second-stage (low-confidence) recovery; [0.0, 1.0]
new_track_thresh: 0.25   # Minimum confidence to initialise a new track; higher reduces false track initiations; [0.0, 1.0]
track_buffer: 30         # Frames to keep a lost track alive before deletion; higher tolerates longer occlusions; [1, inf)
match_thresh: 0.8        # IoU/cost threshold for track-detection assignment; higher = stricter matching; [0.0, 1.0]
fuse_score: true         # Fuse detection confidence with the IoU cost matrix; improves weak-detection robustness; [true, false]

# BoT-SORT specific
gmc_method: sparseOptFlow  # Global motion compensation method; choices: [sparseOptFlow, orb, sift, ecc, none]

# ReID (appearance-based re-identification)
proximity_thresh: 0.5    # Minimum IoU for tracks to be considered proximate enough for ReID comparison; [0.0, 1.0]
appearance_thresh: 0.8  # Minimum cosine similarity for ReID match acceptance; higher reduces identity swaps; [0.0, 1.0]
with_reid: false         # Enable ReID model; requires additional model weights and increases compute; [true, false]
model: auto              # ReID model name or path; "auto" uses detector-derived features if available; string
